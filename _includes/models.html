{% if page.models -%}
    <section class="py-5 bg-primary-light-custom">
        <div class="container overflow-hidden py-lg-5">
            <h2 class="text-center h1 py-4">
                {{ page.models.heading }}
            </h2>
            {% if page.models.content -%}
                <p class="text-center fs-4">
                    {{ page.models.content }}
                </p>
            {%- endif %}
            <div class="row row-cols-auto g-3 py-4 fs-5 text-center justify-content-center">
                {% for model in page.models.list -%}
                <div class="col">
                    <div class="py-3 px-4 rounded-2 bg-white">
                        <h3 class="fs-5 fw-normal mb-0">
                            {{ page.models.brand }} {{ model.name }}
                        </h3>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
{% endif %}
