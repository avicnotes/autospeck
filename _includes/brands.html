{% if page.brands -%}
    <section class="">
        <div class="container overflow-hidden">
            <h2>
                {{ page.brands.heading }}
            </h2>
            {% if page.brands.content -%}
                <p class="text-center fs-4">
                    {{ page.brands.content }}
                </p>
            {%- endif %}
            <div class="row g-3 py-3 fs-5 text-center">
                {% for brand in page.brands.list -%}
                <div class="col-md-4 col-lg-3 col-xl-2">
                    <div class="py-3 rounded-2 bg-tertiary-custom">
                        <h3 class="fs-5 fw-normal">{{ brand.name }}</h3>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
{% endif %}
